kind = "web"
previewPath = "/"
title = "Luxury Saree Brand"
version = "1.0.0"
id = "artifacts/saree-brand"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25757

[services.development]
run = "pnpm --filter @workspace/saree-brand run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saree-brand", "run", "build" ]
publicDir = "artifacts/saree-brand/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25757"
BASE_PATH = "/"
